name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare embedded assets
        shell: bash
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/index.html

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            printf 'The following Go files need formatting:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Test
        run: go test ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Generate Wails bindings
        working-directory: .
        shell: bash
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/index.html
          wails_version="$(go list -m -f '{{.Version}}' github.com/wailsapp/wails/v2)"
          go install "github.com/wailsapp/wails/v2/cmd/wails@${wails_version}"
          "$(go env GOPATH)/bin/wails" generate module

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Test
        run: bun run test:ci

      - name: Build
        run: bun run build

  windows-build:
    name: Windows build
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Install Wails CLI
        shell: pwsh
        run: |
          $wailsVersion = go list -m -f '{{.Version}}' github.com/wailsapp/wails/v2
          go install "github.com/wailsapp/wails/v2/cmd/wails@$wailsVersion"
          $goBin = go env GOBIN
          if (-not $goBin) {
            $goBin = "$(go env GOPATH)\bin"
          }
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows application
        run: wails build -clean -platform windows/amd64
